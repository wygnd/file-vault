services:
  loki:
    image: grafana/loki:latest
    container_name: file-valult_loki
    ports:
      - "127.0.0.1:${LOKI_PORT}:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: on-failure:2

  prometheus:
    image: prom/prometheus:latest
    container_name: file-vault_prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT}:9090"
    command: -config.file=/etc/prometheus-config/prometheus.yaml
    restart: on-failure