name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        run: |
          git clone http://wygndo:${{ secrets.GITEA_TOKEN }}@gitea:3000/wygndo/file-vault.git .

      - name: Create .env
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Deploy
        run: |
          docker compose up -d --build